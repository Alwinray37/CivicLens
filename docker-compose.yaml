services:
  db:
    build:
      context: ./DB
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
  api:
    build:
      context: ./BackendAPI
    restart: unless-stopped
    environment:
      DB_CONN: ${DB_CONN:-}
      DB_PASSWORD: ${DB_PASSWORD}
      OLLAMA_CONN: ${OLLAMA_CONN:-http://ollama:11434}
      ANSWER_MODEL: ${ANSWER_MODEL:-llama3.1:8b}
      EMBED_MODEL: ${EMBED_MODEL:-qwen3-embedding:4b}

      # IP or GLOBAL
      CHATBOT_LIMIT_STRAT: ${CHATBOT_LIMIT_STRAT:-IP}

      # slowapi format (num/interval)
      CHATBOT_LIMIT: ${CHATBOT_LIMIT:-5/minute}

      PYTHONPATH: /app
    depends_on:
      - db
      - ollama
    networks:
      - backend
      - civiclens-public
    develop:
      watch:
        - action: sync
          path: ./BackendAPI/src
          target: /app/src
          initial_sync: true
        - action: rebuild
          path: ./BackendAPI/requirements.txt
          target: /app/requirements.txt
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - backend
      - civiclens-public

  ollama:
    build:
      context: ./Ollama
      dockerfile: Dockerfile
    networks:
      - backend
    environment:
      # you can configure models here or in .env
      ANSWER_MODEL: ${ANSWER_MODEL:-llama3.1:8b}
      EMBED_MODEL: ${EMBED_MODEL:-qwen3-embedding:4b}

      # default 4096
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-8192}

      # -1 or 24h will keep models loaded in vram indefinitely
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    volumes:
      - ollamadata:/root/.ollama
    restart: always
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
volumes:
  pgdata:
  ollamadata:
networks:
  backend:
  civiclens-public:
    external: true
