# This is a basic workflow to help you get started with Actions

name: Unit Tests

# Controls when the workflow will run
# on all branches, with pushes and pull_requests
on:
  pull_request:
    branches:
      - '**'   
  push:
    branches:
      - '**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      ollama:
        image: ollama/ollama:0.16.0
        ports:
          - 11434:11434
      redis:
        image: redis:8.4.2-alpine
        ports:
          - 6379:6379
        
        

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        working-directory: BackendAPI
        run: pip install -r requirements.txt

      - name: Run DB Create Scripts
        working-directory: DB
        env:
          PGPASSWORD: test_password
        run: psql -h localhost -U test_user -d test_db -f create_script.sql

      - name: Install Ollama Model
        working-directory: BackendAPI
        run: |
          curl http://localhost:11434/api/pull -d '{ "model": "smollm:135m" }' &&
          curl http://localhost:11434/api/pull -d '{ "model": "all-minilm:22m" }'

      - name: Run API Tests
        working-directory: BackendAPI
        env:
          DB_CONN: postgresql://test_user:test_password@localhost:5432/test_db
          PYTHONPATH: ${{ github.workspace }}/BackendAPI
          OLLAMA_CONN: http://localhost:11434
          REDIS_CONN: redis://localhost:6379
        run: pytest tests/ -v

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test -- --run
