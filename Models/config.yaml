# LA City Council Meeting Pipeline Configuration
#
# Copy this file to your working directory and edit as needed.
# Any fields omitted here will use the defaults shown below.
#
# PYANNOTE_TOKEN must be set as an environment variable — do NOT put it here.

# Directory where final SQL output files are written
output_dir: "output"

# Directory for intermediate/temporary files during processing
temp_dir: ".temp"

# Calendar year used when fetching meetings with --latest.
# When using --date, the year is derived from the date automatically.
meeting_year: 2026

# PostgreSQL connection string for direct DB insertion.
# Can also be set via the DB_CONN environment variable.
# If not set, the pipeline will only generate SQL files (no DB insert).
# db_url: "postgresql://postgres:password@localhost:5431/postgres"
